<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字时钟</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a0a;
            font-family: 'SF Mono', 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
            user-select: none;
            -webkit-user-select: none;
            transition: background 0.5s;
        }

        .clock-container {
            text-align: center;
        }

        .time {
            font-size: clamp(4rem, 15vw, 12rem);
            font-weight: 300;
            color: #ffffff;
            letter-spacing: 0.05em;
            text-shadow: 0 0 80px rgba(255, 255, 255, 0.15);
            transition: color 0.3s;
        }

        .time .seconds {
            font-size: 0.5em;
            color: rgba(255, 255, 255, 0.4);
            vertical-align: super;
            margin-left: 0.1em;
        }

        .date {
            font-size: clamp(1rem, 3vw, 1.8rem);
            color: rgba(255, 255, 255, 0.5);
            margin-top: 1rem;
            letter-spacing: 0.1em;
            font-weight: 300;
        }

        .weekday {
            color: rgba(255, 255, 255, 0.3);
            font-size: clamp(0.8rem, 2.5vw, 1.4rem);
            margin-top: 0.5rem;
            letter-spacing: 0.15em;
        }

        .divider {
            width: 60px;
            height: 1px;
            background: rgba(255, 255, 255, 0.15);
            margin: 2rem auto;
        }

        .hint {
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            transition: color 0.3s;
        }

        .hint:hover {
            color: rgba(255, 255, 255, 0.5);
        }

        .format-badge {
            display: inline-block;
            padding: 4px 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.35);
            margin-top: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .format-badge:hover {
            border-color: rgba(255, 255, 255, 0.4);
            color: rgba(255, 255, 255, 0.7);
            background: rgba(255, 255, 255, 0.05);
        }

        /* 亮色主题 */
        body.light {
            background: #f5f5f5;
        }

        body.light .time {
            color: #1a1a1a;
            text-shadow: 0 0 80px rgba(0, 0, 0, 0.05);
        }

        body.light .time .seconds {
            color: rgba(0, 0, 0, 0.3);
        }

        body.light .date {
            color: rgba(0, 0, 0, 0.5);
        }

        body.light .weekday {
            color: rgba(0, 0, 0, 0.35);
        }

        body.light .divider {
            background: rgba(0, 0, 0, 0.1);
        }

        body.light .hint {
            color: rgba(0, 0, 0, 0.2);
        }

        body.light .hint:hover {
            color: rgba(0, 0, 0, 0.45);
        }

        body.light .format-badge {
            border-color: rgba(0, 0, 0, 0.15);
            color: rgba(0, 0, 0, 0.35);
        }

        body.light .format-badge:hover {
            border-color: rgba(0, 0, 0, 0.35);
            color: rgba(0, 0, 0, 0.6);
            background: rgba(0, 0, 0, 0.03);
        }
    </style>
</head>
<body>
    <div class="clock-container">
        <div class="time" id="time">00:00<span class="seconds">00</span></div>
        <div class="date" id="date"></div>
        <div class="weekday" id="weekday"></div>
        <div class="divider"></div>
        <div class="format-badge" id="formatToggle" title="点击切换 12/24 小时制">24H</div>
        <div class="hint" style="margin-top:1.5rem">按 T 切换亮色/暗色主题</div>
    </div>

    <script>
        const timeEl = document.getElementById('time');
        const dateEl = document.getElementById('date');
        const weekdayEl = document.getElementById('weekday');
        const formatBadge = document.getElementById('formatToggle');

        let is24Hour = true;
        let isDark = true;

        const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];

        function pad(n) {
            return String(n).padStart(2, '0');
        }

        function update() {
            const now = new Date();

            const hours = now.getHours();
            const minutes = pad(now.getMinutes());
            const seconds = pad(now.getSeconds());

            let displayHours;
            if (is24Hour) {
                displayHours = pad(hours);
            } else {
                const h12 = hours % 12 || 12;
                displayHours = pad(h12);
            }

            timeEl.innerHTML = `${displayHours}:${minutes}<span class="seconds">${seconds}</span>`;

            const year = now.getFullYear();
            const month = pad(now.getMonth() + 1);
            const day = pad(now.getDate());
            dateEl.textContent = `${year} / ${month} / ${day}`;

            weekdayEl.textContent = weekdays[now.getDay()];
        }

        function toggleFormat() {
            is24Hour = !is24Hour;
            formatBadge.textContent = is24Hour ? '24H' : '12H';
            update();
        }

        function toggleTheme() {
            isDark = !isDark;
            if (isDark) {
                document.body.classList.remove('light');
            } else {
                document.body.classList.add('light');
            }
        }

        formatBadge.addEventListener('click', toggleFormat);

        document.addEventListener('keydown', (e) => {
            if (e.key === 't' || e.key === 'T') {
                toggleTheme();
            }
            if (e.key === 'f' || e.key === 'F') {
                toggleFormat();
            }
        });

        update();
        setInterval(update, 1000);
    </script>
</body>
</html>
